name: firestore-soft-delete
version: 0.1.0
specVersion: v1beta
displayName: Firestore Soft Delete
description: >-
  Instead of permanently deleting Firestore documents, this extension moves them to a
  configurable archive collection (_deleted/{collection}/{docId}) and adds a timestampDeleted
  field. Ideal for audit trails and data recovery.
license: Apache-2.0
icon: icon.png
author:
  authorName: aaronat1
  authorUrl: https://github.com/aaronat1
sourceUrl: https://github.com/aaronat1/firestore-soft-delete
billingRequired: true

roles:
  - role: datastore.user
    reason: Required to read deleted documents and write them to the archive collection.

resources:
  - name: softDeleteL1
    type: firebaseextensions.v1beta.function
    description: Archives deleted top-level collection documents ({c1}/{d1}).
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}

  - name: softDeleteL2
    type: firebaseextensions.v1beta.function
    description: Archives deleted depth-2 subcollection documents.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}

  - name: softDeleteL3
    type: firebaseextensions.v1beta.function
    description: Archives deleted depth-3 subcollection documents.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}

  - name: softDeleteL4
    type: firebaseextensions.v1beta.function
    description: Archives deleted depth-4 subcollection documents.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}/{c4}/{d4}

  - name: softDeleteL5
    type: firebaseextensions.v1beta.function
    description: Archives deleted depth-5 subcollection documents.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}/{c4}/{d4}/{c5}/{d5}

params:
  - param: LOCATION
    label: Cloud Functions location
    description: >-
      Where do you want to deploy the functions created for this extension?
    type: select
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Taiwan (asia-east1)
        value: asia-east1
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Singapore (asia-southeast1)
        value: asia-southeast1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
    required: true
    immutable: true

  - param: ARCHIVE_COLLECTION
    label: Archive collection name
    description: >-
      The root collection where deleted documents will be archived.
      Documents are stored as {ARCHIVE_COLLECTION}/{originalCollection}/{documentId}.
    type: string
    default: _deleted
    required: true

  - param: DELETED_AT_FIELD
    label: Deletion timestamp field name
    description: >-
      The name of the field added to archived documents to record when they were deleted.
    type: string
    default: timestampDeleted
    required: true

  - param: EXCLUDED_COLLECTIONS
    label: Excluded collections (optional)
    description: >-
      Comma-separated collection names to exclude from soft-delete archiving.
    type: string
    required: false
